version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: virtnum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-virtnum}
      POSTGRES_USER: ${POSTGRES_USER:-virtnum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - virtnum_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virtnum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtnum_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-virtnum}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-virtnum}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMS_GATEWAY_API_KEY: ${SMS_GATEWAY_API_KEY}
      PORT: 4000
    volumes:
      - backend_logs:/app/logs
    networks:
      - virtnum_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000/ws}
    container_name: virtnum_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - virtnum_net

  nginx:
    image: nginx:alpine
    container_name: virtnum_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - virtnum_net

volumes:
  postgres_data:
  backend_logs:

networks:
  virtnum_net:
    driver: bridge
