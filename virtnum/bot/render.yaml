services:
  - type: web
    name: aisunio-bot
    runtime: node
    repo: https://github.com/muromec061-cyber/virtnum
    branch: main
    rootDir: virtnum/bot
    plan: free
    buildCommand: npm install
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GITHUB_ACCESS_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
