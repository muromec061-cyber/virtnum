name: Keep Alive Bot
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoints
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          FLY_URL="https://aisunio-bot.fly.dev/health"
          echo "Pinging Fly.io: $FLY_URL"
          curl -s -o /dev/null -w "Fly.io: %{http_code}\n" "$FLY_URL" || true
          echo "Pinging Telegram..."
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Bot: @{d[\"result\"][\"username\"]}')" || true
